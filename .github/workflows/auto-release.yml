# .github/workflows/auto-release.yml
name: Tag and release on merge to main

on:
  push:
    branches: [main]

permissions:
  contents: write

# Serialize runs so two quick merges can't race to compute the same tag.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history + all tags to find the latest
      - name: Compute next patch version
        id: bump
        shell: bash
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "$ver"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${latest:-none} -> next: $next"
      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  # Build binaries and publish the GitHub release for the tag we just created.
  # Called directly (not via the tag push) because tags pushed with the default
  # GITHUB_TOKEN do not trigger other workflows.
  release:
    needs: tag
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
