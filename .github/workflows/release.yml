# .github/workflows/release.yml
name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_call:
    inputs:
      tag:
        description: Tag to build and release (used when called from another workflow)
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: node22-win-x64
            artifact: gastando-win-x64.exe
          - os: ubuntu-latest
            target: node22-linux-x64
            artifact: gastando-linux-x64
          - os: macos-latest
            target: node22-macos-arm64
            artifact: gastando-macos-arm64
          - os: macos-latest
            target: node22-macos-x64
            artifact: gastando-macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:css
      - run: npx pkg --config package.json src/server.js --targets ${{ matrix.target }} --output dist/${{ matrix.artifact }}
      - name: Smoke test
        if: matrix.target != 'node22-macos-x64'
        shell: bash
        run: node test/smoke.js dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  # Single job publishes the release once all binaries are built, so the
  # matrix jobs don't race to create the same release (which dropped assets).
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
