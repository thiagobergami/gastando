<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/theme-init.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastando — Parcelas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="pb-24 md:pb-0">
  <div id="nav"></div>
  <main class="max-w-5xl mx-auto px-6 py-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="font-display text-3xl text-ink">Parcelas</h1>
      <input type="month" id="month" class="rounded border border-line bg-card px-3 py-2" />
    </div>
    <div id="list" class="space-y-4"></div>

    <div id="editCard" class="paper-card mt-8" style="display:none">
      <h2 class="font-display text-xl mb-4">Editar parcela</h2>
      <form id="editForm" class="grid gap-3 md:grid-cols-2">
        <input type="hidden" id="editId" />
        <label class="block">Descrição <input id="e_description" class="w-full rounded border border-line px-2 py-1" /></label>
        <label class="block">Categoria <select id="e_category" class="w-full rounded border border-line px-2 py-1"></select></label>
        <label class="block">Cartão <select id="e_card" class="w-full rounded border border-line px-2 py-1"></select></label>
        <label class="block">Total (R$) <input id="e_total" type="number" step="0.01" class="w-full rounded border border-line px-2 py-1" /></label>
        <label class="block">Parcelas <input id="e_count" type="number" min="1" class="w-full rounded border border-line px-2 py-1" /></label>
        <label class="block">Primeiro mês <input id="e_firstMonth" type="month" class="w-full rounded border border-line px-2 py-1" /></label>
        <div class="md:col-span-2 text-right"><button class="btn-primary">Salvar</button></div>
      </form>
    </div>
  </main>
  <script type="module" src="/js/parcelas.js"></script>
</body>
</html>
